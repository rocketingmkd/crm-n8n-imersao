# Stack para Portainer: métricas do HOST (VPS) + opcional n8n
# Em Portainer: Stacks > Add stack > Web editor > Cole e ajuste.
# Build: use o path da pasta onde está este arquivo (ex: . ou ./observability-api).

services:
  observability-api:
    image: observability-api:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: observability-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      # Opcional: URL e API key do n8n para contar workers/execuções
      # - N8N_API_URL=http://n8n:5678
      # - N8N_API_KEY=sua_api_key
    volumes:
      # Ver métricas do HOST (VPS), não só do container
      - /proc:/host/proc:ro
    # Acesso ao df do host para disco (opcional; sem isso disco pode ser do container)
    # Se não montar, a API ainda funciona com CPU/RAM do host via /host/proc
