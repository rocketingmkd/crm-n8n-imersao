name: Deploy to VPS

on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/rocketingmkd/crm-n8n-imersao

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          VITE_N8N_WEBHOOK_URL: ${{ secrets.VITE_N8N_WEBHOOK_URL }}
          VITE_GESTAO_VPS_WEBHOOK_URL: ${{ secrets.VITE_GESTAO_VPS_WEBHOOK_URL }}

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push da imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:latest

      - name: Deploy na VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GHCR_PAT,IMAGE
          script: |
            echo "$GHCR_PAT" | docker login ghcr.io -u rocketingmkd --password-stdin
            docker pull "$IMAGE:latest"
            docker service update \
              --image "$IMAGE:latest" \
              --with-registry-auth \
              --force \
              crm-rocketing
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          IMAGE: ${{ env.IMAGE }}
